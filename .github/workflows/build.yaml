 name: build

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  build:
    permissions:
      contents: write

    strategy:
      matrix:
        board: [octopus]

    runs-on: ubuntu-latest

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 32768
          swap-size-mb: 64
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler pv
          sudo pip3 install protobuf six --break-system-packages

      - name: Run build
        run: |
          set -x
          sudo QUIET=1 bash buildfull_badsh1mmer.sh "${{ matrix.board }}"
          zip badsh1mmer-"${{ matrix.board }}".zip badsh1mmer-"${{ matrix.board }}".bin

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ading2210/gh-large-releases@v1
        with
